<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey - Trades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-screen w-full bg-[#f4f5f8] flex overflow-hidden">

    <div id="sidebar-container" class="h-full shrink-0 z-20"></div>

    <main class="flex-1 h-full overflow-y-auto p-8 relative z-10">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Trades</h1>
            <div class="flex gap-3">
                <button class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50 transition shadow-sm flex items-center gap-2">
                    <i class="fa-solid fa-filter text-slate-400"></i> Filters
                </button>
                <button class="px-4 py-2 bg-indigo-600 text-white border border-indigo-700 rounded-lg text-sm font-bold hover:bg-indigo-700 transition shadow-sm flex items-center gap-2">
                    <i class="fa-solid fa-download"></i> Export
                </button>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
                            <th class="px-6 py-4">Symbol</th>
                            <th class="px-6 py-4">Entry Date</th>
                            <th class="px-6 py-4">Entry Time</th>
                            <th class="px-6 py-4">Side</th>
                            <th class="px-6 py-4">RR</th>
                            <th class="px-6 py-4">Quantity</th>
                            <th class="px-6 py-4 text-right">Profit/Loss</th>
                            <th class="px-6 py-4 text-right">Commission</th>
                            <th class="px-6 py-4 text-right">Net PnL</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">
                        <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                            <td class="px-6 py-4 font-bold text-slate-800">NQ</td>
                            <td class="px-6 py-4 text-slate-500 font-medium">Mar 06, 2026</td>
                            <td class="px-6 py-4 text-slate-500 font-medium">09:30 AM</td>
                            <td class="px-6 py-4">
                                <span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-md text-[11px] font-bold">Long</span>
                            </td>
                            <td class="px-6 py-4 text-slate-600 font-medium">2.50R</td>
                            <td class="px-6 py-4 text-slate-600 font-medium">2</td>
                            <td class="px-6 py-4 text-right text-slate-800 font-semibold">$500.00</td>
                            <td class="px-6 py-4 text-right text-slate-400 font-medium">-$4.00</td>
                            <td class="px-6 py-4 text-right">
                                <span class="px-3 py-1 bg-slate-100 text-slate-700 rounded-full text-[12px] font-bold">$496.00</span>
                            </td>
                        </tr>

                        <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                            <td class="px-6 py-4 font-bold text-slate-800">MNQ</td>
                            <td class="px-6 py-4 text-slate-500 font-medium">Mar 05, 2026</td>
                            <td class="px-6 py-4 text-slate-500 font-medium">10:15 AM</td>
                            <td class="px-6 py-4">
                                <span class="px-2.5 py-1 bg-red-100 text-red-700 rounded-md text-[11px] font-bold">Short</span>
                            </td>
                            <td class="px-6 py-4 text-slate-600 font-medium">-1.00R</td>
                            <td class="px-6 py-4 text-slate-600 font-medium">5</td>
                            <td class="px-6 py-4 text-right text-slate-800 font-semibold">-$100.00</td>
                            <td class="px-6 py-4 text-right text-slate-400 font-medium">-$2.50</td>
                            <td class="px-6 py-4 text-right">
                                <span class="px-3 py-1 bg-slate-100 text-slate-700 rounded-full text-[12px] font-bold">-$102.50</span>
                            </td>
                        </tr>

                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 font-bold text-slate-800">NQ</td>
                            <td class="px-6 py-4 text-slate-500 font-medium">Mar 04, 2026</td>
                            <td class="px-6 py-4 text-slate-500 font-medium">02:00 PM</td>
                            <td class="px-6 py-4">
                                <span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-md text-[11px] font-bold">Long</span>
                            </td>
                            <td class="px-6 py-4 text-slate-600 font-medium">1.20R</td>
                            <td class="px-6 py-4 text-slate-600 font-medium">1</td>
                            <td class="px-6 py-4 text-right text-slate-800 font-semibold">$240.00</td>
                            <td class="px-6 py-4 text-right text-slate-400 font-medium">-$2.00</td>
                            <td class="px-6 py-4 text-right">
                                <span class="px-3 py-1 bg-slate-100 text-slate-700 rounded-full text-[12px] font-bold">$238.00</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-white border-t border-slate-200 px-6 py-4 flex items-center justify-between shrink-0">
                <span class="text-xs text-slate-500 font-medium">Showing 3 of 3 trades</span>
                <div class="flex gap-1">
                    <button class="w-8 h-8 flex items-center justify-center rounded border border-slate-200 text-slate-400 hover:bg-slate-50 transition disabled:opacity-50" disabled><i class="fa-solid fa-chevron-left text-[10px]"></i></button>
                    <button class="w-8 h-8 flex items-center justify-center rounded bg-indigo-50 border border-indigo-100 text-indigo-600 font-bold text-xs">1</button>
                    <button class="w-8 h-8 flex items-center justify-center rounded border border-slate-200 text-slate-400 hover:bg-slate-50 transition disabled:opacity-50" disabled><i class="fa-solid fa-chevron-right text-[10px]"></i></button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // This pulls your sidebar file right into this page automatically
        async function loadSidebar() {
            try {
                const response = await fetch('sidebar.html');
                if (!response.ok) throw new Error('Network response was not ok');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const content = doc.body ? doc.body.innerHTML : html;
                document.getElementById('sidebar-container').innerHTML = content;
            } catch (error) {
                console.error('Error loading sidebar:', error);
            }
        }
        loadSidebar();
    </script>
</body>
</html>
