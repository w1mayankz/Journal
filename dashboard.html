<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-screen w-full bg-[#f4f5f8] text-slate-800 flex overflow-hidden">

    <div id="sidebar-container" class="h-full shrink-0 z-20"></div>

    <main class="flex-1 flex flex-col p-4 gap-4 h-full overflow-y-auto relative z-10">
        
        <header class="flex justify-between items-center shrink-0">
            <div class="flex gap-4 text-xs font-semibold text-slate-500">
                <span class="text-slate-400">Last import: Mar 06, 2026 08:41 AM</span>
                <span class="text-indigo-500 cursor-pointer hover:underline">Resync</span>
            </div>
            <div class="flex gap-3">
                <div class="h-9 w-32 bg-indigo-600 rounded-md flex items-center justify-center text-white text-sm font-bold shadow-sm cursor-pointer hover:bg-indigo-700">Start my day</div>
                <div class="h-9 w-9 bg-white border border-slate-200 rounded-md flex items-center justify-center text-slate-500 cursor-pointer hover:bg-slate-50 shadow-sm">
                    <i class="fa-solid fa-bell"></i>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-5 gap-4 shrink-0">
            <div class="h-20 bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">Net P&L</div>
            <div class="h-20 bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">Win %</div>
            <div class="h-20 bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">Profit Factor</div>
            <div class="h-20 bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">Day Win %</div>
            <div class="h-20 bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">Avg Win/Loss</div>
        </div>

        <div class="grid grid-cols-[repeat(9,minmax(0,1fr))] gap-4 shrink-0">
            <div class="col-span-3 h-[280px] bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">
                <i class="fa-solid fa-spider mb-2 text-xl opacity-40"></i>
                Journey Score (Radar Chart goes here)
            </div>
            <div class="col-span-3 h-[280px] bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">
                <i class="fa-solid fa-chart-line mb-2 text-xl opacity-40"></i>
                Daily Net Cumulative P&L
            </div>
            <div class="col-span-3 h-[280px] bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">
                <i class="fa-solid fa-chart-simple mb-2 text-xl opacity-40"></i>
                Net Daily P&L
            </div>
        </div>

        <div class="grid grid-cols-[repeat(9,minmax(0,1fr))] gap-4 flex-1 pb-2">
            <div class="col-span-2 bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">
                <i class="fa-solid fa-table-list mb-2 text-xl opacity-40"></i>
                Recent Trades
            </div>
            <div class="col-span-7 bg-white border border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-500 text-sm font-medium shadow-sm">
                <i class="fa-solid fa-calendar-days mb-2 text-xl opacity-40"></i>
                Calendar Widget goes here
            </div>
        </div>

    </main>

    <script>
        async function loadSidebar() {
            try {
                const response = await fetch('sidebar.html');
                if (!response.ok) throw new Error('Network response was not ok');
                const html = await response.text();
                
                // Parse the fetched HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Extract just the body contents so we don't duplicate <head> tags
                const content = doc.body ? doc.body.innerHTML : html;
                
                // Inject it into the sidebar container
                document.getElementById('sidebar-container').innerHTML = content;
            } catch (error) {
                console.error('Error loading sidebar:', error);
            }
        }
        
        // Run the function immediately
        loadSidebar();
    </script>
</body>
</html>
