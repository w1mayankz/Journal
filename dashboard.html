<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-screen w-full bg-[#f4f5f8] text-slate-800 flex overflow-hidden">

    <div id="sidebar-container" class="h-full shrink-0 z-20"></div>

    <main id="main-screen" class="flex-1 flex flex-col h-full overflow-y-auto relative z-10">
    </main>

    <script>
        // Fetches the sidebar and puts it on the screen
        async function loadSidebar() {
            const response = await fetch('sidebar.html');
            const html = await response.text();
            document.getElementById('sidebar-container').innerHTML = html;
        }

        // Instantly fetches and swaps the middle content when you click an icon
        window.loadPage = async function(file) {
            const response = await fetch(file);
            const html = await response.text();
            document.getElementById('main-screen').innerHTML = html;
        }

        // Start the app by loading the sidebar and the main dashboard grid
        loadSidebar();
        loadPage('dashboard-ui.html');
    </script>
</body>
</html>
