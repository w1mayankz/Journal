<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradew - Everything you ever wanted to know about your trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Plus Jakarta Sans gives that exact modern SaaS vibe seen in the screenshot */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff; 
            color: #0f172a; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        .gradient-text {
            background: linear-gradient(to right, #5c55e6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-font {
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative pb-20">

    <header class="flex justify-between items-center px-4 py-4 md:px-8 border-b border-gray-100 bg-white sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bullGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#5c55e6" />
                        <stop offset="100%" stop-color="#d946ef" />
                    </linearGradient>
                </defs>
                <path d="M4 10C4 6.68629 6.68629 4 10 4C13.3137 4 16 6.68629 16 10V14C16 17.3137 13.3137 20 10 20C6.68629 20 4 17.3137 4 14V10Z" fill="url(#bullGradient)"/>
                <path d="M14 6C16 4 19 4 21 6C22 7 22 9 20 11L14 16" stroke="url(#bullGradient)" stroke-width="2" stroke-linecap="round"/>
                <path d="M10 6C8 4 5 4 3 6C2 7 2 9 4 11L10 16" stroke="url(#bullGradient)" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="logo-font font-bold text-xl md:text-2xl text-[#0f172a] uppercase">Tradew</span>
        </div>
        
        <button class="w-10 h-10 flex items-center justify-center border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition">
            <i class="fa-solid fa-bars text-lg"></i>
        </button>
    </header>

    <main class="flex-1 flex flex-col items-center pt-16 md:pt-24 px-5 text-center max-w-4xl mx-auto w-full">
        
        <h1 class="text-[42px] md:text-6xl font-extrabold leading-[1.1] text-[#0f172a] tracking-tight">
            Everything you ever<br>
            <span class="gradient-text">wanted to know</span><br>
            about your<br>
            trading...
        </h1>
        
        <h2 class="text-[22px] md:text-3xl font-bold text-[#0f172a] mt-6 md:mt-8 tracking-tight">
            ...but your spreadsheets never told you.
        </h2>
        
        <p class="mt-6 text-[#64748b] text-[15px] md:text-lg max-w-[550px] leading-relaxed font-medium">
            Tradew shows you the metrics that matter—and the behaviors that lead to profit with the power of journaling and analytics.
        </p>
        
        <button onclick="login()" class="mt-8 w-full max-w-[300px] py-4 bg-gradient-to-r from-[#5c55e6] to-[#ec4899] hover:from-[#4f46e5] hover:to-[#db2777] text-white font-semibold rounded-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5 text-[15px]">
            Get Started Now
        </button>

        <div class="mt-14 flex flex-col items-center gap-4">
            <div class="flex items-center gap-2.5">
                <span class="font-bold text-[15px] text-[#0f172a]">800+ Reviews</span>
                <div class="flex gap-[3px]">
                    <div class="bg-[#00B67A] w-[22px] h-[22px] flex items-center justify-center rounded-sm"><i class="fa-solid fa-star text-white text-[11px]"></i></div>
                    <div class="bg-[#00B67A] w-[22px] h-[22px] flex items-center justify-center rounded-sm"><i class="fa-solid fa-star text-white text-[11px]"></i></div>
                    <div class="bg-[#00B67A] w-[22px] h-[22px] flex items-center justify-center rounded-sm"><i class="fa-solid fa-star text-white text-[11px]"></i></div>
                    <div class="bg-[#00B67A] w-[22px] h-[22px] flex items-center justify-center rounded-sm"><i class="fa-solid fa-star text-white text-[11px]"></i></div>
                    <div class="bg-[#00B67A] w-[22px] h-[22px] flex items-center justify-center rounded-sm"><i class="fa-solid fa-star text-white text-[11px]"></i></div>
                </div>
                <span class="font-bold text-[15px] text-[#0f172a]">4.8</span>
            </div>
            
            <div class="flex items-center gap-3">
                <span class="text-[15px] text-[#0f172a] font-medium">Trusted by:</span>
                <div class="flex -space-x-2.5">
                    <img src="https://i.pravatar.cc/100?img=11" class="w-[30px] h-[30px] rounded-full border-2 border-white object-cover shadow-sm">
                    <img src="https://i.pravatar.cc/100?img=12" class="w-[30px] h-[30px] rounded-full border-2 border-white object-cover shadow-sm">
                    <img src="https://i.pravatar.cc/100?img=13" class="w-[30px] h-[30px] rounded-full border-2 border-white object-cover shadow-sm">
                    <img src="https://i.pravatar.cc/100?img=14" class="w-[30px] h-[30px] rounded-full border-2 border-white object-cover shadow-sm">
                    <img src="https://i.pravatar.cc/100?img=15" class="w-[30px] h-[30px] rounded-full border-2 border-white object-cover shadow-sm">
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 right-6 w-14 h-14 bg-[#5c55e6] rounded-full flex items-center justify-center shadow-2xl cursor-pointer hover:scale-105 transition-transform z-50">
        <i class="fa-solid fa-comment text-white text-[22px]"></i>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDcPMNZPoZcsIdz0rrgfbptzCj1xnj5K-U",
          authDomain: "tradew-journal-36ef5.firebaseapp.com",
          projectId: "tradew-journal-36ef5",
          storageBucket: "tradew-journal-36ef5.firebasestorage.app",
          messagingSenderId: "263686780665",
          appId: "1:263686780665:web:59afd7b1e1251c4091d428"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Check if user is already logged in and redirect them to dashboard
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // If you move your dashboard to a file named 'dashboard.html', uncomment the line below:
                // window.location.href = 'dashboard.html';
                console.log("User is already logged in: ", user.displayName);
            }
        });

        // Triggered when "Get Started Now" is clicked
        window.login = () => {
            signInWithPopup(auth, provider).then((result) => {
                // Successful login! Redirect to your protected dashboard file
                // Replace 'dashboard.html' with whatever you name your main app file
                window.location.href = 'dashboard.html'; 
            }).catch(err => {
                alert("Login failed: " + err.message);
            });
        };
    </script>
</body>
</html>
