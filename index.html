<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
        }

        .zella-card {
            background-color: #121214;
            border: 1px solid #27272a;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .text-win { color: #10b981; }
        .text-loss { color: #ef4444; }
        .bg-win { background-color: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); }
        .bg-loss { background-color: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); }
        .bg-neutral { background-color: #18181b; border: 1px solid #27272a; }

        .btn-primary {
            background: linear-gradient(to right, #3b82f6, #2563eb);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            transform: translateY(-1px);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

    <aside class="w-20 lg:w-64 flex-shrink-0 border-r border-[#27272a] bg-[#09090b] flex flex-col justify-between hidden md:flex">
        <div>
            <div class="h-20 flex items-center justify-center lg:justify-start lg:px-8 border-b border-[#27272a]">
                <i class="fa-solid fa-bolt text-blue-500 text-2xl"></i>
                <span class="ml-3 font-bold text-xl hidden lg:block tracking-tight">JournalPro</span>
            </div>
            <nav class="p-4 space-y-2">
                <a href="#" class="flex items-center text-blue-500 bg-blue-500/10 px-4 py-3 rounded-xl transition">
                    <i class="fa-solid fa-border-all text-lg w-6"></i>
                    <span class="ml-3 font-medium hidden lg:block">Dashboard</span>
                </a>
                <a href="#" class="flex items-center text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 px-4 py-3 rounded-xl transition">
                    <i class="fa-solid fa-book text-lg w-6"></i>
                    <span class="ml-3 font-medium hidden lg:block">Trade Log</span>
                </a>
                <a href="#" class="flex items-center text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/50 px-4 py-3 rounded-xl transition">
                    <i class="fa-solid fa-chart-pie text-lg w-6"></i>
                    <span class="ml-3 font-medium hidden lg:block">Reports</span>
                </a>
            </nav>
        </div>
        <div class="p-4 border-t border-[#27272a]">
            <div class="flex items-center text-zinc-400 hover:text-zinc-100 px-4 py-3 cursor-pointer transition">
                <i class="fa-solid fa-gear text-lg w-6"></i>
                <span class="ml-3 font-medium hidden lg:block">Settings</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#09090b]">
        
        <header class="h-20 flex-shrink-0 flex items-center justify-between px-6 lg:px-10 border-b border-[#27272a] bg-[#09090b]/80 backdrop-blur-md z-10">
            <div class="flex items-center space-x-4">
                <h1 class="text-2xl font-bold tracking-tight">Overview</h1>
                <div class="hidden md:flex items-center bg-[#18181b] border border-[#27272a] rounded-lg px-3 py-1.5 text-sm text-zinc-300">
                    <i class="fa-regular fa-calendar mr-2"></i> This Month <i class="fa-solid fa-chevron-down ml-3 text-xs"></i>
                </div>
            </div>
            <button class="btn-primary text-white px-5 py-2.5 rounded-xl font-semibold text-sm shadow-lg shadow-blue-500/20 flex items-center">
                <i class="fa-solid fa-plus mr-2"></i> Add Trade
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-10">
            
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 mb-8">
                <div class="zella-card p-6 flex flex-col justify-between relative overflow-hidden">
                    <div class="text-zinc-400 text-sm font-medium mb-1">Total Net P&L</div>
                    <div class="text-3xl font-bold text-win tracking-tight">+$8,452.50</div>
                    <div class="absolute -bottom-4 -right-4 text-green-500/10"><i class="fa-solid fa-arrow-trend-up text-7xl"></i></div>
                </div>
                <div class="zella-card p-6 flex flex-col justify-between">
                    <div class="text-zinc-400 text-sm font-medium mb-1">Win Rate</div>
                    <div class="flex items-baseline space-x-2">
                        <div class="text-3xl font-bold tracking-tight text-zinc-100">72.4%</div>
                        <div class="text-xs font-medium text-win bg-win px-2 py-0.5 rounded-full">+2.1%</div>
                    </div>
                </div>
                <div class="zella-card p-6 flex flex-col justify-between">
                    <div class="text-zinc-400 text-sm font-medium mb-1">Profit Factor</div>
                    <div class="text-3xl font-bold tracking-tight text-zinc-100">2.84</div>
                </div>
                <div class="zella-card p-6 flex flex-col justify-between">
                    <div class="text-zinc-400 text-sm font-medium mb-1">Average RR</div>
                    <div class="text-3xl font-bold tracking-tight text-zinc-100">1:2.5</div>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 lg:gap-8 mb-8">
                
                <div class="zella-card p-6 xl:col-span-2">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold">Cumulative P&L</h2>
                        <div class="flex space-x-2">
                            <button class="px-3 py-1 text-xs font-medium bg-[#27272a] rounded-md text-zinc-300">1W</button>
                            <button class="px-3 py-1 text-xs font-medium bg-blue-500/20 text-blue-500 rounded-md">1M</button>
                            <button class="px-3 py-1 text-xs font-medium bg-[#27272a] rounded-md text-zinc-300">ALL</button>
                        </div>
                    </div>
                    <div class="relative h-[300px] w-full">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>

                <div class="zella-card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold">Performance Calendar</h2>
                        <span class="text-zinc-400 text-sm font-medium">March 2026</span>
                    </div>
                    <div class="grid grid-cols-7 gap-2 text-center text-xs text-zinc-500 mb-3 font-semibold">
                        <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
                    </div>
                    <div id="calendar-container" class="grid grid-cols-7 gap-2 text-[10px] font-bold">
                        </div>
                </div>
            </div>

            <div class="zella-card overflow-hidden">
                <div class="p-6 border-b border-[#27272a] flex justify-between items-center bg-[#121214]">
                    <h2 class="text-lg font-bold">Recent Executions</h2>
                    <button class="text-sm text-blue-500 hover:text-blue-400 font-medium transition">View All <i class="fa-solid fa-arrow-right ml-1"></i></button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-[#18181b] text-zinc-400 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-4 font-medium">Date & Time</th>
                                <th class="px-6 py-4 font-medium">Symbol</th>
                                <th class="px-6 py-4 font-medium">Side</th>
                                <th class="px-6 py-4 font-medium">Setup</th>
                                <th class="px-6 py-4 font-medium text-right">Net P&L</th>
                            </tr>
                        </thead>
                        <tbody id="execution-table" class="divide-y divide-[#27272a] text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Setup Chart.js with glowing gradient
        const ctx = document.getElementById('mainChart').getContext('2d');
        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(59, 130, 246, 0.5)');
        gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

        Chart.defaults.color = '#71717a';
        Chart.defaults.font.family = 'Inter';

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mar 1', 'Mar 3', 'Mar 5', 'Mar 8', 'Mar 10', 'Mar 12', 'Mar 15', 'Mar 18', 'Mar 22', 'Mar 25'],
                datasets: [{
                    label: 'Cumulative P&L',
                    data: [1200, 1050, 1800, 2400, 2100, 3200, 4500, 4100, 5600, 8452],
                    borderColor: '#3b82f6',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#09090b',
                    pointBorderColor: '#3b82f6',
                    pointBorderWidth: 2,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#18181b',
                        titleColor: '#fafafa',
                        bodyColor: '#10b981',
                        borderColor: '#27272a',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: false,
                        callbacks: {
                            label: function(context) { return '+$' + context.parsed.y; }
                        }
                    }
                },
                scales: {
                    x: { grid: { display: false, drawBorder: false } },
                    y: { 
                        grid: { color: '#27272a', drawBorder: false },
                        border: { dash: [4, 4] }
                    }
                }
            }
        });

        // Calendar Generation
        const calContainer = document.getElementById('calendar-container');
        const emptyDays = 2; // Offset for March 2026
        
        for(let i=0; i<emptyDays; i++) {
            let div = document.createElement('div');
            calContainer.appendChild(div);
        }

        for (let i = 1; i <= 31; i++) {
            let day = document.createElement('div');
            day.className = "aspect-square rounded-md flex flex-col items-center justify-center cursor-pointer transition transform hover:scale-105";
            
            let rand = Math.random();
            let pnlText = "";
            
            if (rand > 0.6) {
                day.classList.add('bg-win', 'text-win');
                pnlText = "+" + Math.floor(Math.random() * 900);
            } else if (rand > 0.3) {
                day.classList.add('bg-loss', 'text-loss');
                pnlText = "-" + Math.floor(Math.random() * 500);
            } else {
                day.classList.add('bg-neutral', 'text-zinc-500');
            }

            day.innerHTML = `<span class="opacity-60 mb-0.5">${i}</span><span class="text-[8px]">${pnlText}</span>`;
            calContainer.appendChild(day);
        }

        // Detailed Trade Data
        const tbody = document.getElementById('execution-table');
        const trades = [
            { date: '2026-03-25 09:41 AM', sym: 'NAS100', side: 'Long', setup: '15m FVG Entry', pnl: 1240.50 },
            { date: '2026-03-24 10:15 AM', sym: 'NQ', side: 'Short', setup: 'Orderblock Rejection', pnl: 850.00 },
            { date: '2026-03-22 14:30 PM', sym: 'NAS100', side: 'Long', setup: 'Liquidity Sweep', pnl: -320.00 },
            { date: '2026-03-20 09:35 AM', sym: 'US30', side: 'Short', setup: 'Break of Structure', pnl: 415.25 },
            { date: '2026-03-18 11:00 AM', sym: 'NAS100', side: 'Long', setup: '15m FVG Entry', pnl: 650.00 }
        ];

        trades.forEach(t => {
            let tr = document.createElement('tr');
            tr.className = "hover:bg-[#18181b] transition group";
            let pnlClass = t.pnl > 0 ? 'text-win' : 'text-loss';
            let pnlSign = t.pnl > 0 ? '+' : '';
            
            let sideBadge = t.side === 'Long' 
                ? '<span class="px-2.5 py-1 bg-blue-500/10 text-blue-500 border border-blue-500/20 rounded font-medium text-xs">Long</span>'
                : '<span class="px-2.5 py-1 bg-purple-500/10 text-purple-500 border border-purple-500/20 rounded font-medium text-xs">Short</span>';

            tr.innerHTML = `
                <td class="px-6 py-4 text-zinc-400 group-hover:text-zinc-300 transition">${t.date}</td>
                <td class="px-6 py-4 font-bold text-zinc-100">${t.sym}</td>
                <td class="px-6 py-4">${sideBadge}</td>
                <td class="px-6 py-4 text-zinc-400">
                    <div class="flex items-center">
                        <i class="fa-solid fa-tag text-xs mr-2 opacity-50"></i> ${t.setup}
                    </div>
                </td>
                <td class="px-6 py-4 font-bold text-right ${pnlClass}">${pnlSign}$${t.pnl.toFixed(2)}</td>
            `;
            tbody.appendChild(tr);
        });
    </script>
</body>
</html>
